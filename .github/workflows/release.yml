name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve release version
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag' ||
      startsWith(github.event.head_commit.message, 'release:')
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          project_version="$(sed -n 's/.*kVersion = "\([0-9][0-9.]*\)".*/\1/p' include/vacuo/version.hpp)"
          cmake_version="$(awk '$1 == "VERSION" { print $2; exit }' CMakeLists.txt)"
          if [[ -z "${project_version}" || "${project_version}" != "${cmake_version}" ]]; then
            echo "C++ and CMake versions do not match" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
            if [[ "${version}" != "${project_version}" ]]; then
              echo "Tag version ${version} does not match project version ${project_version}" >&2
              exit 1
            fi
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            version="${project_version}"
          else
            version="${project_version}-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  portable:
    name: Build and install DEB on Ubuntu 24.04
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Ubuntu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential cmake dpkg-dev libgl1-mesa-dev ninja-build \
            qt6-base-dev qt6-base-dev-tools

      - name: Configure, build and test
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DVACUO_WARNINGS_AS_ERRORS=ON
          cmake --build build --parallel
          ctest --test-dir build --output-on-failure

      - name: Build DEB and install tree
        run: |
          mkdir -p dist package-output
          cpack --config build/CPackConfig.cmake -G DEB -B package-output
          cpack --config build/CPackConfig.cmake -G TGZ -B package-output
          cp package-output/*.deb package-output/*.tar.gz dist/

      - name: Verify DEB dependencies and installation
        run: |
          deb_file="$(find dist -maxdepth 1 -type f -name '*.deb' -print -quit)"
          test -n "${deb_file}"
          dpkg-deb --info "${deb_file}"
          dpkg-deb --contents "${deb_file}"
          if dpkg-deb --field "${deb_file}" Depends | grep -Eq '(^|, )[[:alnum:].+-]+-dev([ ,]|$)'; then
            echo "DEB unexpectedly depends on a development package" >&2
            exit 1
          fi
          dpkg-deb --field "${deb_file}" Depends | grep -Eq '(^|, )policykit-1([ ,]|$)'
          sudo apt-get install --no-install-recommends -y "${deb_file}"
          dpkg-query --show --showformat='${Package} ${Version}\n' vacuo
          dpkg --verify vacuo
          vacuoctl --version
          for binary in /usr/bin/vacuo /usr/bin/vacuoctl /usr/libexec/vacuo-helper; do
            ldd "${binary}" | tee -a /tmp/vacuo-deb-ldd.txt
          done
          ! grep -q 'not found' /tmp/vacuo-deb-ldd.txt
          test "$(stat -c '%U:%G %a' /usr/libexec/vacuo-helper)" = 'root:root 755'
          grep -Fq '/usr/libexec/vacuo-helper' \
            /usr/share/polkit-1/actions/io.github.trendorin.Vacuo.policy

      - name: Verify install tree
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          tree_file="dist/vacuo-${VERSION}-x86_64.tar.gz"
          test -f "${tree_file}"
          tar -tzf "${tree_file}" | tee /tmp/vacuo-tree.txt
          grep -Eq '(^|/)bin/vacuo$' /tmp/vacuo-tree.txt
          grep -Eq '(^|/)bin/vacuoctl$' /tmp/vacuo-tree.txt
          grep -Eq '(^|/)libexec/vacuo-helper$' /tmp/vacuo-tree.txt
          if grep -Eq '(^/|(^|/)\.\.(/|$))' /tmp/vacuo-tree.txt; then
            echo "Install tree contains an unsafe path" >&2
            exit 1
          fi

      - name: Create source, PKGBUILD and SPDX artifacts
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git archive --format=tar.gz \
            --prefix="vacuo-${VERSION}-source/" \
            --output="dist/vacuo-${VERSION}-source.tar.gz" HEAD
          source_hash="$(sha256sum "dist/vacuo-${VERSION}-source.tar.gz" | cut -d' ' -f1)"
          sed -e "s/@VERSION@/${VERSION}/g" -e "s/@SOURCE_SHA256@/${source_hash}/g" \
            packaging/arch/PKGBUILD.in > dist/PKGBUILD
          packaging/scripts/generate-sbom.sh "$VERSION" > "dist/vacuo-${VERSION}.spdx"
          grep -Fq "sha256sums=('${source_hash}')" dist/PKGBUILD

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Vacuo-portable-${{ needs.prepare.outputs.version }}
          path: dist/*
          if-no-files-found: error

  rpm:
    name: Build and install RPM on Fedora 44
    needs: prepare
    runs-on: ubuntu-24.04
    container: fedora:44
    timeout-minutes: 35

    steps:
      - name: Install Fedora build dependencies
        run: |
          dnf install --setopt=install_weak_deps=False -y \
            cmake gcc-c++ git-core ninja-build qt6-qtbase-devel rpm-build

      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure, build and test
        run: |
          cmake -S . -B build-rpm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DVACUO_WARNINGS_AS_ERRORS=ON
          cmake --build build-rpm --parallel
          ctest --test-dir build-rpm --output-on-failure

      - name: Build Fedora RPM
        run: |
          mkdir -p dist package-output
          cpack --config build-rpm/CPackConfig.cmake -G RPM -B package-output
          cp package-output/*.rpm dist/

      - name: Verify Fedora dependencies and installation
        run: |
          rpm_file="$(find dist -maxdepth 1 -type f -name '*.rpm' -print -quit)"
          test -n "${rpm_file}"
          rpm -qpl "${rpm_file}"
          rpm -qpR "${rpm_file}" | sort | tee /tmp/vacuo-rpm-requires.txt
          grep -Eq '^polkit([[:space:]]|$)' /tmp/vacuo-rpm-requires.txt
          dnf install --setopt=install_weak_deps=False -y "${rpm_file}"
          rpm -q vacuo
          rpm -V vacuo
          vacuoctl --version
          for binary in /usr/bin/vacuo /usr/bin/vacuoctl /usr/libexec/vacuo-helper; do
            ldd "${binary}" | tee -a /tmp/vacuo-rpm-ldd.txt
          done
          ! grep -q 'not found' /tmp/vacuo-rpm-ldd.txt
          test "$(stat -c '%U:%G %a' /usr/libexec/vacuo-helper)" = 'root:root 755'
          grep -Fq '/usr/libexec/vacuo-helper' \
            /usr/share/polkit-1/actions/io.github.trendorin.Vacuo.policy

      - name: Upload Fedora RPM
        uses: actions/upload-artifact@v7
        with:
          name: Vacuo-rpm-${{ needs.prepare.outputs.version }}
          path: dist/*.rpm
          if-no-files-found: error

  arch:
    name: Build and install package on Arch Linux
    needs: [prepare, portable]
    runs-on: ubuntu-24.04
    container: archlinux:base-devel
    timeout-minutes: 40

    steps:
      - name: Install Arch build dependencies
        run: pacman -Syu --noconfirm --needed cmake git ninja polkit qt6-base

      - name: Download source and PKGBUILD
        uses: actions/download-artifact@v8
        with:
          name: Vacuo-portable-${{ needs.prepare.outputs.version }}
          path: dist-portable

      - name: Build package as an unprivileged user
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          install -d -m 0755 /tmp/vacuo-package dist
          cp dist-portable/PKGBUILD \
            "dist-portable/vacuo-${VERSION}-source.tar.gz" \
            /tmp/vacuo-package/
          useradd --create-home builder
          chown -R builder:builder /tmp/vacuo-package
          runuser -u builder -- bash -lc \
            'cd /tmp/vacuo-package && LC_ALL=C makepkg --cleanbuild --noconfirm'
          cp "/tmp/vacuo-package/vacuo-${VERSION}-1-x86_64.pkg.tar.zst" dist/

      - name: Verify and install Arch package
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          package_file="dist/vacuo-${VERSION}-1-x86_64.pkg.tar.zst"
          test -f "${package_file}"
          pacman -Qip "${package_file}"
          pacman -Qlp "${package_file}" | tee /tmp/vacuo-arch-files.txt
          grep -q 'usr/bin/vacuo$' /tmp/vacuo-arch-files.txt
          grep -q 'usr/bin/vacuoctl$' /tmp/vacuo-arch-files.txt
          grep -q 'usr/lib/vacuo/vacuo-helper$' /tmp/vacuo-arch-files.txt
          pacman -U --noconfirm "${package_file}"
          pacman -Q vacuo
          pacman -Qkk vacuo
          vacuoctl --version
          for binary in /usr/bin/vacuo /usr/bin/vacuoctl /usr/lib/vacuo/vacuo-helper; do
            ldd "${binary}" | tee -a /tmp/vacuo-arch-ldd.txt
          done
          ! grep -q 'not found' /tmp/vacuo-arch-ldd.txt
          test "$(stat -c '%U:%G %a' /usr/lib/vacuo/vacuo-helper)" = 'root:root 755'
          grep -Fq '/usr/lib/vacuo/vacuo-helper' \
            /usr/share/polkit-1/actions/io.github.trendorin.Vacuo.policy

      - name: Upload Arch package
        uses: actions/upload-artifact@v7
        with:
          name: Vacuo-arch-${{ needs.prepare.outputs.version }}
          path: dist/*.pkg.tar.zst
          if-no-files-found: error

  publish:
    name: Verify and publish release
    needs: [prepare, portable, rpm, arch]
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download portable artifacts
        uses: actions/download-artifact@v8
        with:
          name: Vacuo-portable-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Download Fedora RPM
        uses: actions/download-artifact@v8
        with:
          name: Vacuo-rpm-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Download Arch package
        uses: actions/download-artifact@v8
        with:
          name: Vacuo-arch-${{ needs.prepare.outputs.version }}
          path: dist

      - name: Verify artifact set and create checksums
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          shopt -s nullglob
          deb=(dist/vacuo_"${VERSION}"_*.deb)
          rpm=(dist/vacuo-"${VERSION}"-*.x86_64.rpm)
          arch=(dist/vacuo-"${VERSION}"-1-x86_64.pkg.tar.zst)
          tree=(dist/vacuo-"${VERSION}"-x86_64.tar.gz)
          source=(dist/vacuo-"${VERSION}"-source.tar.gz)
          spdx=(dist/vacuo-"${VERSION}".spdx)
          pkgbuild=(dist/PKGBUILD)
          test "${#deb[@]}" -eq 1
          test "${#rpm[@]}" -eq 1
          test "${#arch[@]}" -eq 1
          test "${#tree[@]}" -eq 1
          test "${#source[@]}" -eq 1
          test "${#spdx[@]}" -eq 1
          test "${#pkgbuild[@]}" -eq 1
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 7
          if find dist -maxdepth 1 -type f -iname '*AppImage*' | grep -q .; then
            echo "Unexpected AppImage artifact" >&2
            exit 1
          fi
          if tar -tzf "${source[0]}" | grep -Eq '(^|/)(CODE_OF_CONDUCT[^/]*|\.env[^/]*|id_rsa|id_ed25519|[^/]*AppImage[^/]*)$'; then
            echo "Source archive contains a forbidden file" >&2
            exit 1
          fi
          source_hash="$(sha256sum "${source[0]}" | cut -d' ' -f1)"
          grep -Fq "sha256sums=('${source_hash}')" "${pkgbuild[0]}"
          grep -Fq "PackageVersion: ${VERSION}" "${spdx[0]}"
          cd dist
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\0' \
            | sort --zero-terminated \
            | xargs --null --no-run-if-empty sha256sum > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*

      - name: Upload verified release set
        uses: actions/upload-artifact@v7
        with:
          name: Vacuo-${{ needs.prepare.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: >-
          github.ref_type == 'tag' ||
          (github.ref_name == 'main' && startsWith(github.event.head_commit.message, 'release:'))
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', needs.prepare.outputs.version) }}
          target_commitish: ${{ github.sha }}
          name: Vacuo ${{ needs.prepare.outputs.version }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: false
          fail_on_unmatched_files: true
          files: dist/*
