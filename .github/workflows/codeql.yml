name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 2"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: C++ security analysis
    runs-on: ubuntu-24.04
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          build-mode: manual
      - name: Configure and build core
        run: |
          cmake -S . -B build-codeql -DCMAKE_BUILD_TYPE=RelWithDebInfo -DVACUO_BUILD_GUI=OFF
          cmake --build build-codeql --parallel
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:cpp
